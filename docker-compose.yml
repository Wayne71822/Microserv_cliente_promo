name: resto2

networks:
  resto2-network:
    driver: bridge

services:
  # --- INFRAESTRUCTURA ---
  customer-db:
    image: postgres:15
    container_name: customer-db
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - resto2-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d customer_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  loyalty-db:
    image: postgres:15
    container_name: loyalty-db
    environment:
      POSTGRES_DB: loyalty_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - resto2-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d loyalty_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - resto2-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MICROSERVICIOS ---
  customer-service:
    build:
      context: ./customer-services
      dockerfile: Dockerfile
    container_name: resto2-customer-service
    networks:
      - resto2-network
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@customer-db/customer_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
      - AUTH0_DOMAIN=dev-casxiurnalctzc4l.us.auth0.com # <--- CORRECCIÓN AQUÍ
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      customer-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  loyalty-service:
    build:
      context: ./loyalty-services
      dockerfile: Dockerfile
    container_name: resto2-loyalty-service
    networks:
      - resto2-network
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@loyalty-db/loyalty_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
      - AUTH0_DOMAIN=dev-casxiurnalctzc4l.us.auth0.com # <--- CORRECCIÓN AQUÍ
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      loyalty-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- GATEWAY ---
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: resto2-gateway
    networks:
      - resto2-network
    ports:
      - "4000:4000"
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8000/graphql
      LOYALTY_SERVICE_URL: http://loyalty-service:8001/graphql
    depends_on:
      customer-service:
        condition: service_healthy
      loyalty-service:
        condition: service_healthy

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resto2-frontend
    networks:
      - resto2-network
    ports:
      - "5173:5173"
    depends_on:
      - gateway
