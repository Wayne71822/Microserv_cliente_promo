version: "3.9"

services:

  # ─── INFRAESTRUCTURA ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  customer-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  loyalty-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loyalty_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"

  # ─── MICROSERVICIOS  ───────────────────────────────────────────────────

  customer-service:
    build:
      context: ./customer-services
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@customer-db/customer_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      rabbitmq:
        condition: service_healthy
      customer-db:
        condition: service_started

  loyalty-service:
    build:
      context: ./loyalty-services
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@loyalty-db/loyalty_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      loyalty-db:
        condition: service_started
      redis:
        condition: service_started

  # ─── MICROSERVICIOS DE COMPAÑEROS ────────────────────────────────────────────
  # Descomentar cuando el compañero tenga su servicio listo y agregarlo aquí
  #
  # menu-service:
  #   build:
  #     context: ./menu-service
  #   ports:
  #     - "8002:8002"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@menu-db/menu_db
  #     RABBITMQ_URL: amqp://guest:guest@rabbitmq/
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #
  # order-service:
  #   build:
  #     context: ./order-service
  #   ports:
  #     - "8003:8003"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@order-db/order_db
  #     RABBITMQ_URL: amqp://guest:guest@rabbitmq/
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy

  # ─── APOLLO GATEWAY ──────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
    ports:
      - "4000:4000"
    environment:
      CUSTOMER_SERVICE_URL: http://customer-service:8000/graphql
      LOYALTY_SERVICE_URL: http://loyalty-service:8001/graphql
      # Agregar URLs de compañeros aquí cuando estén listos:
      # MENU_SERVICE_URL: http://menu-service:8002/graphql
      # ORDER_SERVICE_URL: http://order-service:8003/graphql
      # STAFF_SERVICE_URL: http://staff-service:8004/graphql
    depends_on:
      - customer-service
      - loyalty-service

  # ─── FRONTEND ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_GATEWAY_URL: http://localhost:4000/graphql
    depends_on:
      - gateway
